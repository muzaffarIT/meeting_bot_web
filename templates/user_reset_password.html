{% extends 'base.html' %}
{% block content %}

<div class="page-header">
  <div>
    <h1>Сброс пароля</h1>
    <p class="muted">Обновление пароля для сотрудника {{ target_user.full_name }}.</p>
  </div>
</div>

<div class="card narrow">
  {% if error %}
    <div class="alert alert-error">{{ error }}</div>
  {% endif %}

  <div class="kv" style="margin-bottom: 20px;">
    <div class="kv-row">
      <div class="kv-key">Логин</div>
      <div class="kv-value">{{ target_user.login }}</div>
    </div>
    <div class="kv-row">
      <div class="kv-key">ФИО</div>
      <div class="kv-value">{{ target_user.full_name }}</div>
    </div>
    <div class="kv-row">
      <div class="kv-key">Роль</div>
      <div class="kv-value">{{ target_user.role }}</div>
    </div>
  </div>

  <form method="post" action="/users/{{ target_user.login }}/reset-password" class="form-grid">
    <label>
      Новый пароль
      <input type="password" name="new_password" required placeholder="Введите новый пароль">
    </label>

    <button type="submit">Сохранить новый пароль</button>
  </form>
</div>

{% endblock %}
